# Airflow 2.x — LocalExecutor setup for BiciMAD demand predictor
#
# Usage on the VM (or locally):
#   1. cp infra/airflow.env.example infra/airflow.env  &&  fill in values
#   2. Place the GCP service account key at infra/gcp-key.json
#   3. make airflow-up
#
# The project root is mounted at /opt/airflow/project so DAGs can import
# from src/ without reinstalling the package on every container restart.

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file:
    - airflow.env
  environment:
    PYTHONPATH: /opt/airflow/project
  volumes:
    - ../dags:/opt/airflow/dags
    - ../src:/opt/airflow/project/src
    - ../pyproject.toml:/opt/airflow/project/pyproject.toml:ro
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
    - ./gcp-key.json:/opt/airflow/keys/gcp-key.json:ro
  depends_on:
    postgres:
      condition: service_healthy

services:
  # --------------------------------------------------------------------------
  # Metadata database — shared by Airflow (db: airflow) and MLflow (db: mlflow)
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    mem_limit: 256m
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # One-shot initialiser: run Airflow migrations + create admin user
  # --------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@bicimad.local --password admin || true &&
        airflow connections add google_cloud_default --conn-type google_cloud_platform --conn-extra '{\"key_path\": \"/opt/airflow/keys/gcp-key.json\"}' || true
      "
    restart: "no"

  # --------------------------------------------------------------------------
  # Webserver  — http://<host>:8080
  # --------------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    environment:
      PYTHONPATH: /opt/airflow/project
      AIRFLOW__WEBSERVER__WORKER_CLASS: gevent
      AIRFLOW__WEBSERVER__WORKERS: "2"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 768m
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # --------------------------------------------------------------------------
  # Scheduler
  # --------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    environment:
      PYTHONPATH: /opt/airflow/project
      AIRFLOW__CORE__PARALLELISM: "2"
      AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: "2"
      AIRFLOW__CORE__DAG_FILE_PROCESSOR_TIMEOUT: "120"
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 1500m
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-data:
  airflow-logs:
  airflow-plugins:
