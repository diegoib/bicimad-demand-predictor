# Airflow 2.x — LocalExecutor setup for BiciMAD demand predictor
#
# Usage on the VM (or locally):
#   1. cp infra/airflow.env.example infra/airflow.env  &&  fill in values
#   2. Place the GCP service account key at infra/gcp-key.json
#   3. make airflow-up
#
# The project root is mounted at /opt/airflow/project so DAGs can import
# from src/ without reinstalling the package on every container restart.

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file:
    - airflow.env
  environment:
    PYTHONPATH: /opt/airflow/project
  volumes:
    - ../dags:/opt/airflow/dags
    - ../src:/opt/airflow/project/src
    - ../pyproject.toml:/opt/airflow/project/pyproject.toml:ro
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
    - ./gcp-key.json:/opt/airflow/keys/gcp-key.json:ro
  depends_on:
    postgres:
      condition: service_healthy

services:
  # --------------------------------------------------------------------------
  # Metadata database — shared by Airflow (db: airflow) and MLflow (db: mlflow)
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # MLflow tracking server — http://<host>:5000
  # Uses the same postgres instance (separate 'mlflow' database) and stores
  # model artifacts in GCS under gs://$BICIMAD_GCS_BUCKET/mlflow-artifacts/.
  # --------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.11.1
    env_file:
      - airflow.env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /keys/gcp-key.json
    entrypoint:
      - bash
      - -c
    command:
      - |
        pip install --quiet google-cloud-storage psycopg2-binary &&
        mlflow server \
          --backend-store-uri postgresql+psycopg2://airflow:airflow@postgres:5432/mlflow \
          --artifacts-destination gs://$BICIMAD_GCS_BUCKET/mlflow-artifacts \
          --host 0.0.0.0 \
          --port 5000
    volumes:
      - ./gcp-key.json:/keys/gcp-key.json:ro
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # One-shot initialiser: create mlflow DB + run Airflow migrations + admin user
  # --------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    entrypoint:
      - bash
      - -c
    command:
      - |
        python3 -c "
        import psycopg2
        try:
            conn = psycopg2.connect(host='postgres', user='airflow', password='airflow', dbname='postgres')
            conn.autocommit = True
            conn.cursor().execute('CREATE DATABASE mlflow')
            conn.close()
            print('mlflow database created')
        except Exception as e:
            print(f'mlflow db already exists or error: {e}')
        " &&
        airflow db migrate &&
        airflow users create \
          --username admin --firstname Admin --lastname User \
          --role Admin --email admin@bicimad.local --password admin || true &&
        airflow connections add google_cloud_default \
          --conn-type google_cloud_platform \
          --conn-extra '{"key_path": "/opt/airflow/keys/gcp-key.json"}' || true
    restart: "no"

  # --------------------------------------------------------------------------
  # Webserver  — http://<host>:8080
  # --------------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # --------------------------------------------------------------------------
  # Scheduler
  # --------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-data:
  airflow-logs:
  airflow-plugins:
