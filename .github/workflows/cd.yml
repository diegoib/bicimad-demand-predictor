name: CD

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Require CI to pass first (GitHub branch protection should enforce this).
# This workflow only handles deployment — it does NOT re-run lint/tests.

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build & push training image to Artifact Registry
  # ---------------------------------------------------------------------------
  build-training-image:
    name: Build training image
    runs-on: ubuntu-latest

    permissions:
      contents: read
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/bicimad/training:${SHORT_SHA}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        run: |
          docker build \
            --provenance=false \
            -f infra/training/Dockerfile \
            -t "${{ steps.meta.outputs.image }}" \
            -t "${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/bicimad/training:latest" \
            .
          docker push "${{ steps.meta.outputs.image }}"
          docker push "${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/bicimad/training:latest"

  # ---------------------------------------------------------------------------
  # 2. Update Cloud Run Job to use the new training image
  # ---------------------------------------------------------------------------
  update-training-job:
    name: Update Cloud Run Job
    runs-on: ubuntu-latest
    needs: build-training-image

    permissions:
      contents: read

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Update Cloud Run Job image
        run: |
          gcloud run jobs update bicimad-training \
            --image "${{ needs.build-training-image.outputs.image }}" \
            --region "${{ secrets.GCP_REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}"

  # ---------------------------------------------------------------------------
  # 3. Deploy DAGs + src/ to Airflow VM via SSH
  # ---------------------------------------------------------------------------
  deploy-airflow:
    name: Deploy to Airflow VM
    runs-on: ubuntu-latest
    needs: build-training-image # run in parallel with update-training-job

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Add VM SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AIRFLOW_VM_SSH_KEY }}" > ~/.ssh/bicimad_vm
          chmod 600 ~/.ssh/bicimad_vm
          # Accept host key without interactive prompt
          ssh-keyscan -H "${{ secrets.AIRFLOW_VM_IP }}" >> ~/.ssh/known_hosts

      - name: Pull latest code + restart Airflow scheduler
        # The VM has the project cloned at ~/bicimad.
        # After git pull the scheduler auto-picks up new DAGs within 30 s
        # (dag_dir_list_interval default). We restart it to force immediate reload.
        run: |
          ssh -i ~/.ssh/bicimad_vm \
              -o StrictHostKeyChecking=yes \
              debian@${{ secrets.AIRFLOW_VM_IP }} \
            "cd ~/bicimad && \
             git pull origin main && \
             docker compose -f infra/docker-compose.yml restart airflow-scheduler"
