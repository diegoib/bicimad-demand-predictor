name: Deploy — Airflow VM

on:
  pull_request:
    branches: [main]
    paths:
      - "dags/**"
      - "src/**"
  workflow_dispatch:

# Deploys DAGs and src/ to the Airflow VM by pulling the latest code from main
# and restarting the scheduler so it picks up changes immediately.

jobs:
  deploy-airflow:
    name: Deploy to Airflow VM
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Add VM SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AIRFLOW_VM_SSH_KEY }}" > ~/.ssh/google_compute_engine
          chmod 600 ~/.ssh/google_compute_engine
          ssh-keyscan -H "${{ secrets.AIRFLOW_VM_IP }}" >> ~/.ssh/known_hosts

      - name: Pull latest code + restart Airflow scheduler
        # The VM has the project cloned at ~/bicimad.
        # After git pull the scheduler auto-picks up new DAGs within 30 s
        # (dag_dir_list_interval default). We restart it to force immediate reload.
        run: |
          ssh -i ~/.ssh/google_compute_engine \
              -o StrictHostKeyChecking=yes \
              debian@${{ secrets.AIRFLOW_VM_IP }} \
            "cd ~/bicimad && \
             git pull origin main && \
             docker compose -f infra/docker-compose.yml restart airflow-scheduler"
